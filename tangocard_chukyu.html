<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語カード 中級 1〜8課</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap');

  :root {
    --bg: #0f1923;
    --card-bg: #1a2633;
    --accent: #f5a623;
    --accent2: #4ecdc4;
    --text: #f0f4f8;
    --muted: #7a9ab5;
    --border: #2a3f55;
    --test-accent: #e94560;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(78,205,196,0.05) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(245,166,35,0.05) 0%, transparent 60%);
    transition: background-color 0.4s;
  }
  body.test-mode {
    background-color: #1a1a2e;
    background-image:
      radial-gradient(ellipse at 30% 60%, rgba(233,69,96,0.07) 0%, transparent 60%);
  }

  .mode-switcher {
    width: 100%; max-width: 700px;
    display: flex; gap: 8px; margin-bottom: 20px;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.25); border-radius: 12px; padding: 6px;
  }
  .mode-btn {
    flex: 1; border: none; border-radius: 8px; padding: 10px;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 0.85rem;
    cursor: pointer; transition: all 0.25s; color: var(--muted); background: transparent;
  }
  .mode-btn.active-study { background: linear-gradient(135deg, var(--accent2), #38b2ac); color: #0f1923; }
  .mode-btn.active-test  { background: linear-gradient(135deg, var(--test-accent), #c23152); color: #fff; }
  .mode-btn.active-print { background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff; }
  .mode-btn.active-word  { background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f1923; }

  header {
    width: 100%; max-width: 700px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px;
  }
  header h1 {
    font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: 1.4rem;
    color: var(--accent); transition: color 0.3s;
  }
  body.test-mode header h1 { color: var(--test-accent); }
  .counter { font-size: 0.85rem; color: var(--muted); }

  .progress-bar {
    width: 100%; max-width: 700px; height: 4px;
    background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 20px;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.4s ease, background 0.3s;
  }
  body.test-mode .progress-fill { background: linear-gradient(90deg, var(--test-accent), #f5a623); }

  /* SCORE BAR */
  .score-bar {
    display: none; width: 100%; max-width: 700px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(233,69,96,0.2);
    border-radius: 12px; padding: 12px 20px; margin-bottom: 16px;
    justify-content: space-around; align-items: center;
  }
  body.test-mode .score-bar { display: flex; }
  .score-item { text-align: center; }
  .score-num { font-size: 1.6rem; font-weight: 900; font-family: 'Zen Kaku Gothic New', sans-serif; }
  .score-label { font-size: 0.7rem; color: var(--muted); }
  .score-correct .score-num { color: var(--accent2); }
  .score-wrong .score-num { color: var(--test-accent); }
  .score-remain .score-num { color: var(--accent); }

  /* CARD */
  .card-area { width: 100%; max-width: 700px; margin-bottom: 24px; }
  .card {
    width: 100%; min-height: 420px; background: var(--card-bg);
    border: 1.5px solid rgba(255,255,255,0.25); border-radius: 20px;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    padding: 32px 32px 28px; position: relative; overflow: hidden;
    animation: cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    transition: border-color 0.3s;
  }
  body.test-mode .card { border-color: rgba(233,69,96,0.25); }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: background 0.3s;
  }
  body.test-mode .card::before { background: linear-gradient(90deg, var(--test-accent), #f5a623); }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-num { position: absolute; top: 20px; right: 24px; font-size: 0.75rem; color: var(--muted); }
  .test-badge {
    display: none; position: absolute; top: 16px; left: 20px;
    background: var(--test-accent); color: white;
    font-size: 0.65rem; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  }
  body.test-mode .test-badge { display: block; }

  .image-area {
    width: 100%; max-width: 220px; height: 160px; border-radius: 12px; overflow: hidden;
    background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center;
    font-size: 4.5rem; border: 1px solid var(--border); margin-bottom: 8px; flex-shrink: 0;
  }
  .image-area.hidden { display: none; }

  /* 例文2本（none タイプ用） */
  .example2-block {
    display: none;
    width: 100%;
    background: rgba(245,166,35,0.05);
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 12px;
    padding: 12px 18px;
    margin-top: -8px;
  }
  .example2-block.visible { display: block; }
  .example2-label {
    font-size: 0.68rem; color: var(--accent); letter-spacing: 0.1em;
    margin-bottom: 4px; font-weight: 700;
  }
  .example2-jp { font-size: 0.9rem; line-height: 1.8; color: var(--text); }
  .example2-jp mark { background: none; color: var(--accent); font-weight: 700; }
  .blank2 {
    display: inline-block; min-width: 80px; height: 1.3em;
    border-bottom: 2px solid var(--test-accent); vertical-align: bottom;
    margin: 0 2px; background: rgba(233,69,96,0.06); border-radius: 2px;
  }
  .blank2.filled { color: var(--test-accent); font-weight: 700; border-bottom-color: transparent; background: rgba(233,69,96,0.12); padding: 0 6px; }

  .word-block { text-align: center; padding: 8px 0 4px; }
  .word-reading { font-size: 0.9rem; color: var(--accent2); letter-spacing: 0.15em; margin-bottom: 4px; }
  .word-main { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 3rem; font-weight: 900; line-height: 1; }
  .word-romaji { font-size: 0.8rem; color: var(--muted); margin-top: 6px; }

  .word-block.hidden .word-main,
  .word-block.hidden .word-reading,
  .word-block.hidden .word-romaji { filter: blur(8px); user-select: none; transition: filter 0.3s; }
  .word-block.revealed .word-main,
  .word-block.revealed .word-reading,
  .word-block.revealed .word-romaji { filter: none; transition: filter 0.3s; }

  .answer-hint { display: none; width: 100%; max-width: 320px; text-align: center; margin: 4px 0; }
  body.test-mode .answer-hint { display: none; }
  .hint-btn {
    background: rgba(233,69,96,0.12); border: 1px solid rgba(233,69,96,0.3); color: var(--test-accent);
    border-radius: 8px; padding: 8px 20px; font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem; font-weight: 700; cursor: pointer; width: 100%; transition: all 0.2s;
  }
  .hint-btn:hover { background: rgba(233,69,96,0.22); }
  .hint-btn.revealed { background: rgba(233,69,96,0.25); color: white; }

  .example-block {
    width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px; display: flex; align-items: flex-start; gap: 12px;
  }
  .example-text { flex: 1; }
  .example-jp { font-size: 0.95rem; line-height: 1.8; color: var(--text); }
  .example-jp mark { background: none; color: var(--accent); font-weight: 700; }

  .blank {
    display: inline-block; min-width: 80px; height: 1.3em;
    border-bottom: 2px solid var(--test-accent); vertical-align: bottom;
    margin: 0 2px; background: rgba(233,69,96,0.06); border-radius: 2px; transition: all 0.3s;
  }
  .blank.filled {
    color: var(--test-accent); font-weight: 700;
    border-bottom-color: transparent; background: rgba(233,69,96,0.12); padding: 0 6px;
  }

  .speak-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    color: var(--accent2); cursor: pointer; padding: 6px 10px; font-size: 1.1rem;
    transition: all 0.2s; flex-shrink: 0; margin-top: 2px;
  }
  .speak-btn:hover { background: rgba(78,205,196,0.12); border-color: var(--accent2); }
  .speak-btn.playing { animation: pulse 0.6s ease-in-out infinite alternate; }
  body.test-mode .speak-btn { display: none; }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.15); } }

  /* SELF JUDGE */
  .self-judge { display: none; width: 100%; max-width: 700px; gap: 10px; margin-bottom: 16px; }
  body.test-mode .self-judge { display: none; }
  .judge-btn {
    flex: 1; padding: 12px; border: none; border-radius: 10px;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 0.9rem;
    cursor: pointer; transition: all 0.2s; opacity: 0.35;
  }
  .judge-btn.enabled { opacity: 1; }
  .judge-correct { background: rgba(78,205,196,0.15); color: var(--accent2); border: 1px solid rgba(78,205,196,0.3); }
  .judge-correct.enabled:hover { background: rgba(78,205,196,0.28); transform: translateY(-1px); }
  .judge-wrong   { background: rgba(233,69,96,0.15); color: var(--test-accent); border: 1px solid rgba(233,69,96,0.3); }
  .judge-wrong.enabled:hover { background: rgba(233,69,96,0.28); transform: translateY(-1px); }

  /* CONTROLS */
  .controls {
    width: 100%; max-width: 700px; display: flex; gap: 12px;
    justify-content: center; flex-wrap: wrap; margin-bottom: 20px;
  }
  .btn {
    border: none; border-radius: 10px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; font-weight: 700; font-size: 0.9rem;
    padding: 14px 28px; transition: all 0.2s;
  }
  .btn-main { background: linear-gradient(135deg, var(--accent2), #38b2ac); color: #0f1923; flex: 1; max-width: 240px; }
  .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(78,205,196,0.35); }
  body.test-mode .btn-main { background: linear-gradient(135deg, var(--test-accent), #c23152); color: white; }
  body.test-mode .btn-main:hover { box-shadow: 0 8px 24px rgba(233,69,96,0.35); }
  .btn-secondary { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); padding: 14px 20px; }
  .btn-secondary:hover { background: rgba(255,255,255,0.10); color: var(--text); }
  .btn-auto { background: rgba(245,166,35,0.12); color: var(--accent); border: 1px solid rgba(245,166,35,0.3); padding: 14px 20px; font-size: 0.85rem; }
  .btn-auto.active { background: var(--accent); color: #0f1923; }
  body.test-mode .btn-auto { display: none; }

  /* PRINT PANEL */
  .print-panel {
    display: none; width: 100%; max-width: 700px;
    background: var(--card-bg); border: 1px solid rgba(167,139,250,0.3);
    border-radius: 20px; padding: 28px 32px; margin-bottom: 24px;
  }
  .print-panel.open { display: block; }
  .print-panel h2 { font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 1.1rem; font-weight: 900; color: #a78bfa; margin-bottom: 16px; }
  .print-panel p { font-size: 0.85rem; color: var(--muted); margin-bottom: 16px; line-height: 1.7; }

  .print-options { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .print-opt {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 0.85rem; color: var(--muted); transition: all 0.2s;
  }
  .print-opt:hover { border-color: #a78bfa; color: var(--text); }
  .print-opt input { accent-color: #a78bfa; }

  .btn-print {
    background: linear-gradient(135deg, #a78bfa, #7c3aed); color: white; border: none;
    border-radius: 10px; padding: 12px 28px; font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
  }
  .btn-print:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,58,237,0.4); }

  /* WORD LIST */
  .list-toggle {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-size: 0.8rem; padding: 8px 16px; border-radius: 8px; cursor: pointer;
    font-family: inherit; transition: all 0.2s; margin-bottom: 16px;
  }
  .list-toggle:hover { color: var(--text); border-color: var(--muted); }
  .word-list { width: 100%; max-width: 700px; display: none; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .word-list.open { display: flex; }
  .word-chip {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 14px; font-size: 0.85rem;
    cursor: pointer; transition: all 0.2s; color: var(--muted);
  }
  .word-chip:hover { border-color: var(--accent2); color: var(--text); }
  .word-chip.seen    { color: var(--accent2); border-color: rgba(78,205,196,0.3); }
  .word-chip.correct { color: var(--accent2); border-color: var(--accent2); background: rgba(78,205,196,0.08); }
  .word-chip.wrong   { color: var(--test-accent); border-color: var(--test-accent); background: rgba(233,69,96,0.08); }


  /* 英訳表示 */
  .en-toggle {
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem; font-weight: 700; padding: 6px 14px; cursor: pointer;
    transition: all 0.2s; margin-bottom: 8px;
  }
  .en-toggle:hover { color: var(--text); border-color: var(--muted); }
  .en-toggle.active { background: rgba(78,205,196,0.15); border-color: var(--accent2); color: var(--accent2); }

  .word-en {
    display: none;
    font-size: 1rem; color: var(--accent2); letter-spacing: 0.05em;
    margin-top: 6px; font-weight: 700;
  }
  .word-en.visible { display: block; }
  /* LESSON SELECTOR */
  .lesson-selector {
    width: 100%; max-width: 700px;
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .lesson-label {
    font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em;
    white-space: nowrap; font-weight: 700;
  }
  .lesson-btns { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .lesson-btn {
    border: 1.5px solid rgba(255,255,255,0.25); border-radius: 8px;
    background: rgba(255,255,255,0.04); color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif; font-size: 0.8rem; font-weight: 700;
    padding: 6px 14px; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .lesson-btn:hover { border-color: var(--accent2); color: var(--text); }
  .lesson-btn.active {
    background: rgba(78,205,196,0.15); border-color: var(--accent2); color: var(--accent2);
  }
  .lesson-btn.all.active {
    background: rgba(245,166,35,0.15); border-color: var(--accent); color: var(--accent);
  }


  /* WORD GROUP MODE */
  /* word-group shown in test-mode */

  .word-group {
    display: none;
    width: 100%; max-width: 700px;
    flex-wrap: wrap; gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
  }
  body.test-mode .word-group { display: flex; }

  .wg-btn {
    border: 2px solid #ffffff;
    border-radius: 10px;
    background: #2a4a6b;
    color: #ffffff !important;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem; font-weight: 900;
    padding: 10px 18px;
    cursor: pointer; transition: all 0.2s;
    min-width: 80px; text-align: center;
    -webkit-text-fill-color: #ffffff;
  }
  .wg-btn:disabled {
    border: 2px solid rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.18);
    color: #ffffff;
    opacity: 1;
    cursor: default;
  }
  .wg-btn:hover { background: rgba(233,69,96,0.3); border-color: var(--test-accent); }
  .wg-btn.correct-ans {
    background: rgba(78,205,196,0.2); border-color: var(--accent2); color: var(--accent2);
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .wg-btn.wrong-ans {
    background: rgba(233,69,96,0.2); border-color: var(--test-accent); color: var(--test-accent);
    animation: shake 0.3s ease;
  }
  .wg-btn:disabled { opacity: 0.5; cursor: default; }

  .wg-result {
    display: none; width: 100%; text-align: center;
    font-size: 1.1rem; font-weight: 700; padding: 8px;
  }
  body.test-mode .wg-result { display: block; }

  @keyframes popIn { from{transform:scale(0.9)} to{transform:scale(1)} }
  @keyframes shake {
    0%{transform:translateX(0)} 25%{transform:translateX(-6px)}
    75%{transform:translateX(6px)} 100%{transform:translateX(0)}
  }

  /* PRINT STYLES */
  @media print {
    body > * { display: none !important; }
    #printSheet { display: block !important; font-family: 'Noto Sans JP', sans-serif; color: black; background: white; padding: 16px; }
  }
  #printSheet { display: none; }
  #printSheet .sheet-title { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
  #printSheet .sheet-meta { font-size: 12px; color: #555; margin-bottom: 16px; }
  #printSheet table { width: 100%; border-collapse: collapse; }
  #printSheet th { background: #1a2633; color: white; padding: 8px 10px; font-size: 11px; border: 1px solid #bbb; text-align: left; }
  #printSheet td { padding: 9px 10px; border: 1px solid #ddd; font-size: 13px; vertical-align: middle; }
  #printSheet tr:nth-child(even) td { background: #f7f9fb; }
  #printSheet .num-col { width: 32px; text-align: center; color: #888; font-size: 11px; }
  #printSheet .emoji-col { width: 38px; text-align: center; font-size: 18px; }
  #printSheet .write-col { min-width: 110px; }
  #printSheet .blank-line { display: inline-block; width: 88px; border-bottom: 1.5px solid #333; margin: 0 2px; }
</style>
</head>
<body>

<header>
  <h1 id="pageTitle">単語カード ／ 中級（1〜8課）</h1>
  <span class="counter" id="counter">1 / 25</span>
</header>

<div class="mode-switcher">
  <button class="mode-btn active-study" id="btnStudy" onclick="setMode('study')">📖 学習モード</button>
  <button class="mode-btn" id="btnTest"  onclick="setMode('test')">✏️ テストモード</button>
  <button class="mode-btn" id="btnPrint" onclick="setMode('print')">🖨️ 印刷ワークシート</button>
</div>

<div class="lesson-selector" id="lessonSelector">
  <span class="lesson-label">📚 課：</span>
  <div class="lesson-btns" id="lessonBtns"></div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progress" style="width:4%"></div></div>

<div class="score-bar">
  <div class="score-item score-correct"><div class="score-num" id="scoreCorrect">0</div><div class="score-label">正解 ✓</div></div>
  <div class="score-item score-wrong"><div class="score-num" id="scoreWrong">0</div><div class="score-label">要復習 ✗</div></div>
  <div class="score-item score-remain"><div class="score-num" id="scoreRemain">25</div><div class="score-label">残り</div></div>
</div>

<div class="card-area" id="cardArea">
  <div class="card" id="card">
    <span class="test-badge">TEST</span>
    <span class="card-num" id="cardNum">#01</span>
    <div class="image-area" id="imageArea">🍎</div>
    <div class="word-block" id="wordBlock">
      <div class="word-reading" id="reading">りんご</div>
      <div class="word-main" id="wordMain">林檎</div>
      <div class="word-romaji" id="romaji">ringo</div>
    </div>
    <div class="answer-hint">
      <button class="hint-btn" id="hintBtn" onclick="revealAnswer()">👁 答えを確認する</button>
    </div>
    <div class="example-block">
      <div class="example-text"><div class="example-jp" id="exampleJp"></div></div>
      <button class="speak-btn" id="speakBtn" onclick="speakExample()">🔊</button>
    </div>
    <div class="example2-block" id="example2Block">
      <div class="example2-label">例文 ②</div>
      <div class="example2-jp" id="exampleJp2"></div>
    </div>
  </div>
</div>

<div class="word-group" id="wordGroup"></div>
<div class="wg-result" id="wgResult">　</div>

<div class="self-judge">
  <button class="judge-btn judge-correct" id="judgeCorrect" onclick="judge(true)">⭕ 書けた！</button>
  <button class="judge-btn judge-wrong"   id="judgeWrong"   onclick="judge(false)">✗ もう一度</button>
</div>

<div class="controls" id="controls">

  { lesson:"4-3", word:"思いがけない", reading:"おもいがけない", romaji:"", illus:"none", emoji:"", example:"外国でぐうぜん友だちに会うという{思いがけない}できごとがありました。", plain:"外国でぐうぜん友だちに会うという思いがけないできごとがありました。", en:"unexpected / surprising" },
  { lesson:"4-3", word:"アイデア", reading:"アイデア", romaji:"", illus:"none", emoji:"", example:"いい{アイデア}があったら、みんなに教えてください。", plain:"いいアイデアがあったら、みんなに教えてください。", en:"idea" },
  { lesson:"4-3", word:"見方", reading:"みかた", romaji:"", illus:"none", emoji:"", example:"同じ出来事でも、人によって{見方}が違います。", plain:"同じ出来事でも、人によって見方が違います。", en:"viewpoint / perspective" },
  { lesson:"4-3", word:"批判する", reading:"ひはんする", romaji:"", illus:"none", emoji:"", example:"人の意見をすぐに{批判}するのはよくありません。", plain:"人の意見をすぐに批判するのはよくありません。", en:"to criticize" },
  { lesson:"4-3", word:"気にする", reading:"きにする", romaji:"", illus:"none", emoji:"", example:"小さいことをあまり{気にし}ないほうがいいです。", plain:"小さいことをあまり気にしないほうがいいです。", en:"to mind / worry about" },
  { lesson:"4-3", word:"個性", reading:"こせい", romaji:"", illus:"none", emoji:"", example:"人にはそれぞれ違う{個性}があります。", plain:"人にはそれぞれ違う個性があります。", en:"individuality / personality" },
  { lesson:"4-3", word:"単調", reading:"たんちょう", romaji:"", illus:"none", emoji:"", example:"毎日同じ仕事だけだと、生活が{単調}に感じます。", plain:"毎日同じ仕事だけだと、生活が単調に感じます。", en:"monotonous / dull" }
];

let order = [...Array(vocab.length).keys()];
let currentIdx = 0;
let autoTimer = null;
let seenSet = new Set();
let currentMode = 'study';
let answered = false;
let scores = { correct: 0, wrong: 0 };
let judgeMap = {};
let currentLesson = 'all'; // 'all' or lesson number

// 課一覧を自動生成

let showEn = false;
function toggleEn() {
  showEn = !showEn;
  const btn = document.getElementById('enToggle');
  btn.classList.toggle('active', showEn);
  btn.textContent = showEn ? '🌐 英訳を隠す' : '🌐 英訳を表示する';
  document.getElementById('wordEn').className = 'word-en' + (showEn ? ' visible' : '');
}
function buildLessonBtns() {
  const lessons = [...new Set(vocab.map(v => v.lesson))].sort((a,b) => {
    const [aMain, aSub] = String(a).split('-').map(Number);
    const [bMain, bSub] = String(b).split('-').map(Number);
    return aMain !== bMain ? aMain - bMain : (aSub||0) - (bSub||0);
  });
  const container = document.getElementById('lessonBtns');
  container.innerHTML = '';
  // 全課ボタン
  const allBtn = document.createElement('button');
  allBtn.className = 'lesson-btn all active';
  allBtn.textContent = '全課';
  allBtn.onclick = () => selectLesson('all');
  container.appendChild(allBtn);
  // 各課ボタン
  lessons.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lesson-btn';
    btn.id = `lessonBtn_${l}`;
    const count = vocab.filter(v => v.lesson === l).length;
    btn.textContent = `第${l}課 (${count}語)`;
    btn.onclick = () => selectLesson(l);
    container.appendChild(btn);
  });
}

function selectLesson(lesson) {
  currentLesson = lesson;
  // ボタンのactive更新
  document.querySelectorAll('.lesson-btn').forEach(b => b.classList.remove('active'));
  const target = lesson === 'all'
    ? document.querySelector('.lesson-btn.all')
    : document.getElementById(`lessonBtn_${lesson}`);
  if (target) target.classList.add('active');
  // フィルター適用してリセット
  applyLessonFilter();
}

function getFilteredIndices() {
  if (currentLesson === 'all') return [...Array(vocab.length).keys()];
  return vocab.map((v,i) => v.lesson === currentLesson ? i : -1).filter(i => i !== -1);
}

function applyLessonFilter() {
  const indices = getFilteredIndices();
  order = [...indices];
  currentIdx = 0;
  seenSet.clear();
  judgeMap = {};
  scores = { correct: 0, wrong: 0 };
  updateScoreBar();
  // カウンター更新
  document.getElementById('scoreRemain').textContent = order.length;
  showCard(0);
}

function setMode(mode) {
  currentMode = mode;
  document.body.classList.toggle('test-mode', mode === 'test');
  document.getElementById('btnStudy').className = 'mode-btn' + (mode === 'study' ? ' active-study' : '');
  document.getElementById('btnTest').className  = 'mode-btn' + (mode === 'test'  ? ' active-test'  : '');
  document.getElementById('btnPrint').className = 'mode-btn' + (mode === 'print' ? ' active-print' : '');

  document.getElementById('printPanel').classList.toggle('open', mode === 'print');
  document.getElementById('cardArea').style.display   = mode === 'print' ? 'none' : '';
  document.getElementById('controls').style.display   = mode === 'print' ? 'none' : '';
  const titles = { study: '単語カード ／ 中級（1〜8課）', test: '✏️ テスト ／ 中級（1〜8課）', print: '🖨️ 印刷ワークシート' };
  document.getElementById('pageTitle').textContent = titles[mode];
  if (mode === 'test') { scores = { correct:0, wrong:0 }; judgeMap = {}; updateScoreBar(); }
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; document.getElementById('autoBtn').classList.remove('active'); document.getElementById('autoBtn').textContent = '▶ 自動再生'; }
  showCard(currentIdx);
}

function fmtEx(template, isTest, revealed, cls='blank') {
  if (!isTest) return template.replace(/\{([^}]+)\}/g, '<mark>$1</mark>');
  if (revealed) return template.replace(/\{([^}]+)\}/g, `<span class="${cls} filled">$1</span>`);
  return template.replace(/\{([^}]+)\}/g, `<span class="${cls}"></span>`);
}

function showCard(idx) {
  const v = vocab[order[idx]];
  seenSet.add(order[idx]);
  answered = false;
  const card = document.getElementById('card');
  card.style.animation = 'none'; void card.offsetWidth;
  card.style.animation = 'cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
  const isTest = currentMode === 'test';

  document.getElementById('cardNum').textContent = '#' + String(idx+1).padStart(2,'0');
  document.getElementById('reading').textContent = v.reading;
  document.getElementById('wordMain').textContent = v.word;
  document.getElementById('romaji').textContent = v.romaji;
  document.getElementById('wordEn').textContent = v.en || '';
  document.getElementById('wordEn').className = 'word-en' + (showEn ? ' visible' : '');

  // イラストタイプ別表示
  const imgArea = document.getElementById('imageArea');
  const illus = v.illus || 'emoji';
  if (illus === 'none') {
    imgArea.className = 'image-area hidden';
  } else if (illus === 'image' && v.image) {
    imgArea.className = 'image-area';
    imgArea.innerHTML = `<img src="images/${v.image}" alt="${v.word}" onerror="this.parentNode.textContent='🖼️'">`;
  } else {
    imgArea.className = 'image-area';
    imgArea.textContent = v.emoji || '？';
  }

  // 例文1
  document.getElementById('exampleJp').innerHTML = fmtEx(v.example, isTest, false, 'blank');

  // 例文2（noneタイプのみ）
  const ex2block = document.getElementById('example2Block');
  if (v.example2) {
    ex2block.className = 'example2-block visible';
    document.getElementById('exampleJp2').innerHTML = fmtEx(v.example2, isTest, false, 'blank2');
  } else {
    ex2block.className = 'example2-block';
    document.getElementById('exampleJp2').innerHTML = '';
  }

  document.getElementById('wordBlock').className = 'word-block ' + (isTest ? 'hidden' : 'revealed');
  const hintBtn = document.getElementById('hintBtn');
  hintBtn.textContent = '👁 答えを確認する'; hintBtn.classList.remove('revealed');
  document.getElementById('judgeCorrect').classList.remove('enabled');
  document.getElementById('judgeWrong').classList.remove('enabled');
  document.getElementById('counter').textContent = `${idx+1} / ${order.length}`;
  document.getElementById('progress').style.width = `${((idx+1)/order.length)*100}%`;
  document.getElementById('speakBtn').classList.remove('playing');
  // 語群モード
  if (currentMode === 'test') {
    buildWordGroup(order[idx]);
  } else {
    document.getElementById('wordGroup').innerHTML = '';
    document.getElementById('wgResult').textContent = '　';
  }
  updateWordList();
}

function revealAnswer() {
  if (answered) return;
  answered = true;
  const v = vocab[order[currentIdx]];
  document.getElementById('wordBlock').className = 'word-block revealed';
  document.getElementById('exampleJp').innerHTML = fmtEx(v.example, true, true, 'blank');
  if (v.example2) {
    document.getElementById('exampleJp2').innerHTML = fmtEx(v.example2, true, true, 'blank2');
  }
  const hintBtn = document.getElementById('hintBtn');
  hintBtn.textContent = '✓ 答えを確認しました'; hintBtn.classList.add('revealed');
  document.getElementById('judgeCorrect').classList.add('enabled');
  document.getElementById('judgeWrong').classList.add('enabled');
}

function judge(correct) {
  if (!answered) { revealAnswer(); return; }
  const ri = order[currentIdx];
  const was = ri in judgeMap, prev = judgeMap[ri];
  judgeMap[ri] = correct;
  if (!was) { if (correct) scores.correct++; else scores.wrong++; }
  else if (prev !== correct) { if (correct) { scores.correct++; scores.wrong = Math.max(0, scores.wrong-1); } else { scores.wrong++; scores.correct = Math.max(0, scores.correct-1); } }
  updateScoreBar(); updateWordList();
  setTimeout(nextCard, 350);
}

function updateScoreBar() {
  document.getElementById('scoreCorrect').textContent = scores.correct;
  document.getElementById('scoreWrong').textContent = scores.wrong;
  document.getElementById('scoreRemain').textContent = order.length - scores.correct - scores.wrong;
}

function nextCard() { currentIdx = (currentIdx < order.length-1) ? currentIdx+1 : 0; showCard(currentIdx); }
function prevCard() { currentIdx = (currentIdx > 0) ? currentIdx-1 : order.length-1; showCard(currentIdx); }

function shuffleCards() {
  const indices = getFilteredIndices();
  for (let i = indices.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [indices[i],indices[j]]=[indices[j],indices[i]]; }
  order = indices;
  currentIdx = 0; seenSet.clear(); judgeMap = {}; scores = {correct:0,wrong:0};
  updateScoreBar(); showCard(0);
}

function speakExample() {
  const v = vocab[order[currentIdx]], btn = document.getElementById('speakBtn');
  // VOICEVOXの音声ファイルを優先、なければブラウザTTSにフォールバック
  const filename = `audio/${v.lesson}_${v.word}_ex.wav`;
  const audio = new Audio(filename);
  audio.oncanplaythrough = () => {
    btn.classList.add('playing');
    audio.play();
    audio.onended = () => btn.classList.remove('playing');
  };
  audio.onerror = () => {
    // 音声ファイルがない場合はブラウザTTSで代替
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(v.plain);
      u.lang = 'ja-JP'; u.rate = 0.85;
      btn.classList.add('playing'); u.onend = () => btn.classList.remove('playing');
      window.speechSynthesis.speak(u);
    }
  };
  audio.load();
}

function toggleAuto() {
  const btn = document.getElementById('autoBtn');
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; btn.classList.remove('active'); btn.textContent = '▶ 自動再生'; }
  else { btn.classList.add('active'); btn.textContent = '⏸ 停止'; speakExample(); autoTimer = setInterval(() => { nextCard(); setTimeout(speakExample, 600); }, 7000); }
}

function toggleList() { document.getElementById('wordList').classList.toggle('open'); updateWordList(); }


function buildWordGroup(vocabIdx) {
  const v = vocab[vocabIdx];
  const lessonWords = vocab
    .map((w, i) => ({ w, i }))
    .filter(({ w }) => w.lesson === v.lesson && w.word !== v.word)
    .map(({ w }) => w.word);

  // シャッフルして最大7個＋正解で8択
  for (let i = lessonWords.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [lessonWords[i], lessonWords[j]] = [lessonWords[j], lessonWords[i]];
  }
  const choices = [v.word, ...lessonWords.slice(0, 7)];
  for (let i = choices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [choices[i], choices[j]] = [choices[j], choices[i]];
  }

  const group = document.getElementById('wordGroup');
  const result = document.getElementById('wgResult');
  result.textContent = '　';
  group.innerHTML = '';

  choices.forEach(word => {
    const btn = document.createElement('button');
    btn.className = 'wg-btn';
    btn.textContent = word;
    // ボタンは最初から有効
    btn.onclick = () => {
      if (btn.disabled) return;
      const correct = word === v.word;
      group.querySelectorAll('.wg-btn').forEach(b => b.disabled = true);
      if (correct) {
        btn.classList.add('correct-ans');
        result.style.color = 'var(--accent2)';
        result.textContent = '⭕ 正解！';
        // 単語・読みを表示して答えを確認できるようにする
        document.getElementById('wordBlock').className = 'word-block revealed';
        document.getElementById('exampleJp').innerHTML = fmtEx(v.example, true, true, 'blank');
        if (v.example2) document.getElementById('exampleJp2').innerHTML = fmtEx(v.example2, true, true, 'blank2');
        setTimeout(nextCard, 1200);
      } else {
        btn.classList.add('wrong-ans');
        result.style.color = 'var(--test-accent)';
        result.textContent = '✗ もう一度考えてみよう';
        // 正解を光らせる
        group.querySelectorAll('.wg-btn').forEach(b => {
          if (b.textContent === v.word) b.classList.add('correct-ans');
          else b.disabled = true;
          b.disabled = false;
        });
        setTimeout(() => {
          group.querySelectorAll('.wg-btn').forEach(b => b.disabled = false);
        }, 800);
      }
    };
    group.appendChild(btn);
  });
}

function updateWordList() {
  const list = document.getElementById('wordList');
  list.innerHTML = '';
  vocab.forEach((v, i) => {
    const chip = document.createElement('div');
    let cls = 'word-chip';
    if (i in judgeMap) cls += judgeMap[i] ? ' correct' : ' wrong';
    else if (seenSet.has(i)) cls += ' seen';
    chip.className = cls;
    chip.textContent = v.word + '　' + v.reading;
    chip.onclick = () => { let ci = order.indexOf(i); if (ci===-1){order.unshift(i);ci=0;} currentIdx=ci; showCard(currentIdx); };
    list.appendChild(chip);
  });
}

function printSheet() {
  const showEmoji   = document.getElementById('optEmoji').checked;
  const showReading = document.getElementById('optReading').checked;
  const showExample = document.getElementById('optExample').checked;
  const showWrite   = document.getElementById('optWriteCol').checked;

  const targetVocab = getFilteredIndices().map(i => vocab[i]);
  const lessonLabel = currentLesson === 'all' ? '全課' : `第${currentLesson}課`;
  const perPage = 20;

  const blank = txt => txt.replace(/\{([^}]+)\}/g,
    '<span style="display:inline-block;min-width:80px;border-bottom:1.5px solid #333;margin:0 2px;vertical-align:bottom;">&nbsp;</span>');

  // 20問ずつページ分割
  let pages = '';
  for (let p = 0; p < targetVocab.length; p += perPage) {
    const chunk = targetVocab.slice(p, p + perPage);
    const pageNum = Math.floor(p / perPage) + 1;
    const totalPages = Math.ceil(targetVocab.length / perPage);

    let rows = '';
    chunk.forEach((v, i) => {
      const num = p + i + 1;
      const emojiCell = showEmoji
        ? `<td style="text-align:center;font-size:32px;padding:6px 4px;border:1px solid #ddd;width:52px;line-height:1;">${v.illus !== 'none' ? v.emoji : ''}</td>` : '';
      const ex2line   = v.example2 ? `<div style="margin-top:5px;">${blank(v.example2)}</div>` : '';
      const readLine  = showReading ? `<div style="font-size:10px;color:#888;margin-top:2px;">${v.reading}</div>` : '';
      const exCell    = showExample
        ? `<td style="padding:7px 10px;font-size:13px;line-height:1.9;border:1px solid #ddd;">${blank(v.example)}${ex2line}${readLine}</td>` : '';
      const writeCell = showWrite
        ? `<td style="padding:7px;min-width:90px;border:1px solid #ddd;"></td>` : '';
      const bg = i % 2 === 1 ? '#f7f9fb' : '#ffffff';
      rows += `<tr style="background:${bg};">
        <td style="text-align:center;color:#888;font-size:11px;padding:7px;border:1px solid #ddd;width:30px;color:#111;">${num}</td>
        ${emojiCell}${exCell}${writeCell}
      </tr>`;
    });

    const emojiTh = showEmoji  ? `<th style="width:52px;padding:7px;background:#1a2633;color:white;border:1px solid #999;font-size:11px;">絵</th>` : '';
    const exTh    = showExample? `<th style="padding:7px;background:#1a2633;color:white;border:1px solid #999;font-size:11px;">例　文</th>` : '';
    const writeTh = showWrite  ? `<th style="min-width:90px;padding:7px;background:#1a2633;color:white;border:1px solid #999;font-size:11px;">書いてみよう</th>` : '';

    const isLast = (p + perPage) >= targetVocab.length;
    pages += `
    <div style="${isLast ? '' : 'page-break-after:always;'}">
      <h2 style="font-size:16px;margin:0 0 5px;color:#111;">単語テスト ／ 中級　${lessonLabel}${totalPages > 1 ? `　(${pageNum}/${totalPages})` : ''}</h2>
      <div style="font-size:12px;color:#555;margin-bottom:14px;line-height:2.4;background:white;">
        名前：＿＿＿＿＿＿＿＿＿＿＿　日付：＿＿＿＿月＿＿＿日　点数：＿＿＿／${chunk.length}
      </div>
      <table style="width:100%;border-collapse:collapse;">
        <tr>
          <th style="width:30px;padding:7px;background:#1a2633;color:white;border:1px solid #999;font-size:11px;">No.</th>
          ${emojiTh}${exTh}${writeTh}
        </tr>
        ${rows}
      </table>
      <div style="margin-top:16px;padding:12px 16px;border:1px solid #ccc;border-radius:8px;background:#f8f9fa;">
        <span style="font-size:12px;font-weight:bold;color:#1a2633;margin-right:12px;">【語　群】</span>
        ${[...chunk.map(v=>v.word)].sort(()=>Math.random()-0.5).map(w=>`<span style="display:inline-block;border:1px solid #aaa;border-radius:5px;padding:3px 10px;font-size:13px;background:white;margin:2px;">${w}</span>`).join('')}
      </div>
    </div>`;
  }



  // iframeでCSSを完全分離して表示
  const overlay = document.getElementById('printOverlay');
  const iframeHTML = `<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8">
<style>
  *{box-sizing:border-box;}
  body{font-family:sans-serif;padding:20px;color:#111;background:white;margin:0;}
  h2{font-size:16px;margin:0 0 5px;color:#111;}
  .meta{font-size:12px;color:#555;margin-bottom:14px;line-height:2.4;}
  table{width:100%;border-collapse:collapse;}
  th{background:#1a2633;color:white;padding:7px;border:1px solid #999;font-size:11px;text-align:left;}
  td{padding:7px 10px;border:1px solid #ddd;font-size:13px;color:#111;vertical-align:middle;}
  tr:nth-child(even) td{background:#f7f9fb;}
  .wordgroup{margin-top:16px;padding:12px 16px;border:1px solid #ccc;border-radius:8px;background:#f8f9fa;}
  .wordgroup-label{font-size:12px;font-weight:bold;color:#1a2633;margin-right:12px;}
  .wordgroup-item{display:inline-block;border:1px solid #aaa;border-radius:5px;padding:3px 10px;font-size:13px;background:white;margin:2px;color:#111;}
  .topbar{margin-bottom:16px;display:flex;gap:10px;}
  .btn{padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;}
  .btn-print{background:#1a2633;color:white;}
  .btn-back{background:#eee;color:#333;}
  .page{margin-bottom:32px;}
  @media print{.topbar{display:none!important;}}
</style>
</head><body>
<div class="topbar">
  <button class="btn btn-print" onclick="window.print()">🖨️ 印刷 / PDFで保存</button>
  <button class="btn btn-back" onclick="parent.document.getElementById('printOverlay').style.display='none'">← 戻る</button>
</div>
${pages}
</body></html>`;

  overlay.innerHTML = '<iframe id="printFrame" style="position:fixed;top:0;left:0;width:100%;height:100%;border:none;z-index:9999;background:white;"></iframe>';
  overlay.style.display = 'block';
  const iframe = document.getElementById('printFrame');
  iframe.onload = () => {};
  iframe.srcdoc = iframeHTML;
}

buildLessonBtns();
showCard(0);
</script>
</body>
</html>
